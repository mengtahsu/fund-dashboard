<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>今日選基金 · 分析結果</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .wrap { max-width: 960px; margin: 0 auto; padding: 8px 16px 40px; }
    .back { color: var(--accent); text-decoration: none; font-size: 14px; }
    .meta-bar { display: flex; gap: 16px; flex-wrap: wrap; color: var(--muted); font-size: 13px; margin: 8px 0 18px; }
    .meta-bar b { color: var(--text); }
    .top-pick {
      background: linear-gradient(135deg, rgba(255,90,90,0.14), var(--panel));
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 22px; margin-bottom: 20px;
    }
    .top-pick .crown { font-size: 13px; color: var(--up); letter-spacing: 2px; }
    .top-pick .fund { font-size: 28px; font-weight: 800; margin: 6px 0 2px; }
    .top-pick .company { color: var(--muted); font-size: 14px; }
    .top-pick .nums { display: flex; gap: 28px; margin-top: 16px; flex-wrap: wrap; }
    .top-pick .nums .n .label { font-size: 12px; color: var(--muted); }
    .top-pick .nums .n .v { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .criteria { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 18px; font-size: 13px; color: var(--muted); }
    .criteria li { margin: 3px 0; }
    .empty { padding: 30px; text-align: center; color: var(--muted); }
    h2.sec { font-size: 16px; margin: 22px 0 10px; }
    .pass { color: var(--up); } .fail { color: var(--down); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🎯</span>
      <div>
        <h1>今日選基金</h1>
        <p class="subtitle">3 月前段班 × 1 月贏大盤</p>
      </div>
    </div>
    <a class="back" href="index.html">← 回行情看板</a>
  </header>

  <div class="wrap">
    <div class="meta-bar" id="meta-bar">載入中…</div>

    <div class="criteria">
      <b style="color:var(--text)">選股邏輯</b>
      <ul style="margin:6px 0 0; padding-left:18px;">
        <li>① 近 3 個月報酬排名進「前 1/3」（前段班）</li>
        <li>② 近 1 個月報酬「贏過大盤 (TAIEX) 同期」 ← 最重要</li>
        <li>排序：依「近 1 個月超額報酬（基金1月 − 大盤1月）」由大到小</li>
      </ul>
    </div>

    <div id="top-pick"></div>

    <h2 class="sec">✅ 通過雙重篩選的基金</h2>
    <div class="panel"><div class="table-wrap"><table>
      <thead><tr>
        <th>排名</th><th>基金名稱</th><th>基金公司</th>
        <th class="num">近1月</th><th class="num">近3月</th><th class="num">超額(贏大盤)</th>
      </tr></thead>
      <tbody id="picks-tbody"></tbody>
    </table></div></div>

    <h2 class="sec">📋 近 3 月前段班（含未通過第 ② 關者）</h2>
    <div class="panel"><div class="table-wrap"><table>
      <thead><tr>
        <th>基金名稱</th><th>基金公司</th>
        <th class="num">近1月</th><th class="num">近3月</th><th>是否贏大盤</th>
      </tr></thead>
      <tbody id="third-tbody"></tbody>
    </table></div></div>

    <p class="empty" style="font-size:12px; text-align:left; margin-top:20px;">
      ※ 本結果為程式依公開資料自動產生，僅供參考，<b>非投資建議</b>。基金有風險，申購前請詳閱公開說明書。
    </p>
  </div>

  <script>
    const fmtPct = (v) => (v >= 0 ? "+" : "") + Number(v).toFixed(2) + "%";
    const cls = (v) => (v >= 0 ? "up" : "down");

    fetch("results.json?_=" + Date.now())
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(render)
      .catch((e) => {
        document.getElementById("meta-bar").innerHTML =
          "尚無分析結果（results.json 不存在或載入失敗）。請先在 GitHub Actions 觸發一次分析。";
      });

    function render(d) {
      const b = d.benchmark || {};
      document.getElementById("meta-bar").innerHTML =
        `更新時間：<b>${d.generated_at}</b>` +
        ` · 基金池 <b>${d.universe_size}</b> 檔` +
        ` · 前1/3 取 <b>${d.top_third_cutoff}</b> 檔` +
        ` · 大盤(TAIEX) 近1月 <b class="${cls(b.r1m)}">${b.r1m == null ? "—" : fmtPct(b.r1m)}</b>` +
        ` / 近3月 <b class="${cls(b.r3m)}">${b.r3m == null ? "—" : fmtPct(b.r3m)}</b>` +
        (d.benchmark_missing ? " ⚠️大盤資料缺，第②關改用 >0%" : "");

      // 首選
      const picks = d.picks || [];
      const tp = document.getElementById("top-pick");
      if (picks.length) {
        const p = picks[0];
        tp.innerHTML = `
          <div class="top-pick">
            <div class="crown">★ 今日首選</div>
            <div class="fund">${p.name}</div>
            <div class="company">${p.company}</div>
            <div class="nums">
              <div class="n"><div class="label">近1月</div><div class="v ${cls(p.r1m)}">${fmtPct(p.r1m)}</div></div>
              <div class="n"><div class="label">近3月</div><div class="v ${cls(p.r3m)}">${fmtPct(p.r3m)}</div></div>
              <div class="n"><div class="label">贏大盤(超額)</div><div class="v ${cls(p.excess)}">${fmtPct(p.excess)}</div></div>
            </div>
          </div>`;
      } else {
        tp.innerHTML = `<div class="top-pick"><div class="crown">今日無首選</div>
          <div class="company" style="margin-top:8px">近 3 月前段班中，沒有任何一檔近 1 月贏過大盤。可參考下方前段班清單。</div></div>`;
      }

      // 通過清單
      document.getElementById("picks-tbody").innerHTML = picks.map((p) => `
        <tr>
          <td>${p.rank}</td><td>${p.name}</td><td>${p.company}</td>
          <td class="num ${cls(p.r1m)}">${fmtPct(p.r1m)}</td>
          <td class="num ${cls(p.r3m)}">${fmtPct(p.r3m)}</td>
          <td class="num ${cls(p.excess)}">${fmtPct(p.excess)}</td>
        </tr>`).join("") || `<tr><td colspan="6" class="empty">無</td></tr>`;

      // 前段班
      document.getElementById("third-tbody").innerHTML = (d.top_third || []).map((f) => `
        <tr>
          <td>${f.name}</td><td>${f.company}</td>
          <td class="num ${cls(f.r1m)}">${fmtPct(f.r1m)}</td>
          <td class="num ${cls(f.r3m)}">${fmtPct(f.r3m)}</td>
          <td class="${f.beat_market ? "pass" : "fail"}">${f.beat_market ? "✅ 贏" : "✘ 輸"}</td>
        </tr>`).join("");
    }
  </script>
</body>
</html>
