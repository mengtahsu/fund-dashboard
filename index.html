<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基金行情看板</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">📈</span>
      <div>
        <h1>基金行情看板</h1>
        <p class="subtitle">國內基金真實績效 · <span id="fund-count">—</span> 檔</p>
      </div>
    </div>
    <div class="topbar-right">
      <a class="cta" href="pick.html">🎯 今日選基金</a>
      <input id="search" class="search" type="search" placeholder="搜尋基金名稱…" autocomplete="off" />
      <span class="updated">資料更新：<span id="updated-date">—</span></span>
    </div>
  </header>

  <section class="kpis" id="kpis"><!-- KPI 卡片由 JS 產生 --></section>

  <div class="chips" id="category-chips"><!-- 類別篩選 --></div>

  <main class="layout">
    <section class="panel table-panel">
      <div class="panel-head">
        <h2>基金排行</h2>
        <span class="hint">點選一列查看走勢</span>
      </div>
      <div class="table-wrap">
        <table id="fund-table">
          <thead>
            <tr>
              <th data-sort="name">名稱</th>
              <th data-sort="category" class="col-hide-sm">類別</th>
              <th data-sort="r1m" class="num">近1月</th>
              <th data-sort="r3m" class="num">近3月</th>
              <th data-sort="r1y" class="num">近1年</th>
            </tr>
          </thead>
          <tbody id="fund-tbody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel detail-panel">
      <div class="panel-head">
        <div>
          <h2 id="detail-name">—</h2>
          <span id="detail-meta" class="detail-meta"></span>
        </div>
        <span class="hint">績效走勢（指數化，現在=100）</span>
      </div>
      <div class="detail-stats" id="detail-stats"></div>
      <div class="chart-wrap">
        <canvas id="nav-chart"></canvas>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span>※ 資料來源 MoneyDJ，每日自動更新；績效走勢由各期報酬重建，僅供參考、非投資建議。</span>
    <span class="convention">漲跌色：<b class="up">紅漲</b> / <b class="down">綠跌</b></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
